<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Dashboard - IMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body.dark-mode header { background: #1a252f; border-bottom: 1px solid #2c3e50; }
    body.dark-mode header h1 { color: #ecf0f1; }
    body { padding-top: 0 !important; }

    .kpi-table-container { overflow-x: auto; margin-bottom: 20px; border: 1px solid #ccc; }
    .kpi-table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
    .kpi-table th, .kpi-table td { border: 1px solid #ccc; padding: 6px 8px; text-align: center; }
    .kpi-table th { background-color: #f0f0f0; font-weight: bold; }
    
    body.dark-mode .kpi-table th { background-color: #2c2c2c; border-color: #444; color: #e0e0e0; }
    body.dark-mode .kpi-table td { border-color: #444; color: #e0e0e0; background-color: #1e1e1e; }
    .week-total-col { background-color: #e8f5e9 !important; font-weight: bold; }
    body.dark-mode .week-total-col { background-color: #1b5e20 !important; }
    .sunday-col { color: #e74c3c !important; }

    /* Sticky Columns */
    .sticky-col { position: sticky; z-index: 2; background-color: #f9f9f9; box-shadow: 1px 0 0 #ccc; }
    th.sticky-col { z-index: 3; background-color: #e0e0e0; }
    body.dark-mode .sticky-col { background-color: #252525; box-shadow: 1px 0 0 #444; }
    body.dark-mode th.sticky-col { background-color: #1a1a1a; }

    .col-area { width: 80px; min-width: 80px; max-width: 80px; }
    .col-shift { width: 80px; min-width: 80px; max-width: 80px; }
    .col-target { width: 70px; min-width: 70px; max-width: 70px; }
    .col-ave { width: 70px; min-width: 70px; max-width: 70px; }
    .col-part { width: 120px; min-width: 120px; max-width: 120px; }

    /* Editable Cells */
    .editable-cell { cursor: text; border-bottom: 1px dashed #ccc; background-color: transparent; }
    .editable-cell:hover { background-color: #fff; }
    body.dark-mode .editable-cell:hover { background-color: #333; }
    .editable-cell:focus { background-color: #e3f2fd; outline: none; border-bottom: 2px solid #2752a7; }

    .highlight-row { background-color: #e3f2fd; }
    .highlight-row .sticky-col { background-color: #e3f2fd; }
    body.dark-mode .highlight-row { background-color: #37474f; }
    body.dark-mode .highlight-row .sticky-col { background-color: #37474f; }

    .kpi-success { background-color: #c8e6c9 !important; color: #2e7d32 !important; font-weight: bold; }
    body.dark-mode .kpi-success { background-color: #1b5e20 !important; color: #a5d6a7 !important; }

    .kpi-failure { background-color: #ffcdd2 !important; color: #c62828 !important; }
    body.dark-mode .kpi-failure { background-color: #b71c1c !important; color: #ffcdd2 !important; }

    .legend-box { margin-top: 10px; font-size: 12px; color: #666; display: flex; gap: 15px; align-items: center; padding: 10px; background: #f9f9f9; border-radius: 4px; }
    body.dark-mode .legend-box { background-color: #252525; color: #b0bec5; }

    .kpi-fullscreen {
        position: fixed !important;
        top: 0;
        left: 0;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 20000;
        margin: 0 !important;
        border-radius: 0 !important;
        background-color: var(--card, #fff);
    }
  </style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        if(!sessionStorage.getItem('dms_auth_v1')) window.location.href = 'index.html';

        function getShiftFromTimestamp(ts) {
            const d = new Date(ts);
            if (isNaN(d.getTime())) return { date: '', shift: '' };
            const h = d.getHours();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            let dateStr = `${year}-${month}-${day}`;
            let shift = '';
            
            if (h >= 6 && h < 14) {
                shift = '1st Shift-(6am-2pm)';
            } else if (h >= 14 && h < 22) {
                shift = '2nd Shift-(2pm-10pm)';
            } else {
                shift = '3rd Shift-(10pm-6am)';
                if (h < 6) {
                    const prev = new Date(d);
                    prev.setDate(d.getDate() - 1);
                    const pYear = prev.getFullYear();
                    const pMonth = String(prev.getMonth() + 1).padStart(2, '0');
                    const pDay = String(prev.getDate()).padStart(2, '0');
                    dateStr = `${pYear}-${pMonth}-${pDay}`;
                }
            }
            return { date: dateStr, shift };
        }

        const kpiApplyBtn = document.getElementById('kpi-apply-btn');
        const kpiClearBtn = document.getElementById('kpi-clear-btn');
        const kpiResetInputsBtn = document.getElementById('kpi-reset-inputs-btn');
        const kpiExportExcelBtn = document.getElementById('kpi-export-excel-btn');
        const kpiWeekFilter = document.getElementById('kpi-week-filter');
        let kpiChartInstance = null;
        const kpiChartMetric = document.getElementById('kpi-chart-metric');

        if(kpiApplyBtn) {
            kpiApplyBtn.addEventListener('click', () => {
                const s = document.getElementById('kpi-start-date').value;
                const e = document.getElementById('kpi-end-date').value;
                if(s) localStorage.setItem('ims_kpi_start_date', s);
                if(e) localStorage.setItem('ims_kpi_end_date', e);
                updateWeekOptions();
                renderKpiReport();
            });
        }

        if(kpiClearBtn) {
            kpiClearBtn.addEventListener('click', () => {
                localStorage.removeItem('ims_kpi_start_date');
                localStorage.removeItem('ims_kpi_end_date');
                
                const now = new Date();
                const year = now.getFullYear();
                const firstJan = new Date(year, 0, 1);
                const day = firstJan.getDay();
                const diff = firstJan.getDate() - day + (day === 0 ? -6 : 1); // Monday start
                const firstMonday = new Date(firstJan.setDate(diff));
                
                document.getElementById('kpi-start-date').value = firstMonday.toISOString().split('T')[0];
                document.getElementById('kpi-end-date').value = now.toISOString().split('T')[0];
                
                updateWeekOptions();
                renderKpiReport();
            });
        }

        if(kpiResetInputsBtn) {
            kpiResetInputsBtn.addEventListener('click', () => {
                if(confirm('Reset all manual inputs?')) {
                    localStorage.removeItem('ims_kpi_overrides_v1');
                    renderKpiReport();
                }
            });
        }

        if(kpiExportExcelBtn) {
            kpiExportExcelBtn.addEventListener('click', () => {
                const wb = XLSX.utils.book_new();
                const areas = [
                    { id: 'kpi-reserved-container', name: 'Reserved Bin' },
                    { id: 'kpi-pick-container', name: 'Pick Bin' }
                ];
                
                let hasData = false;

                areas.forEach(area => {
                    const container = document.getElementById(area.id);
                    if (!container) return;
                    const tables = container.querySelectorAll('table');
                    
                    if (tables.length > 0) {
                        hasData = true;
                        // Create sheet from first table
                        const ws = XLSX.utils.table_to_sheet(tables[0]);
                        
                        // Append subsequent tables
                        for (let i = 1; i < tables.length; i++) {
                            const range = XLSX.utils.decode_range(ws['!ref']);
                            const nextRow = range.e.r + 2; // 1 empty row gap
                            
                            const prevSibling = tables[i].previousElementSibling;
                            if (prevSibling && prevSibling.tagName === 'H5') {
                                XLSX.utils.sheet_add_aoa(ws, [[prevSibling.textContent]], { origin: { r: nextRow, c: 0 } });
                                XLSX.utils.sheet_add_dom(ws, tables[i], { origin: { r: nextRow + 1, c: 0 } });
                            } else {
                                XLSX.utils.sheet_add_dom(ws, tables[i], { origin: { r: nextRow, c: 0 } });
                            }
                        }
                        XLSX.utils.book_append_sheet(wb, ws, area.name);
                    }
                });

                if (hasData) {
                    XLSX.writeFile(wb, `KPI_Dashboard_${new Date().toISOString().split('T')[0]}.xlsx`);
                } else {
                    alert('No data to export.');
                }
            });
        }

        if(kpiWeekFilter) {
            kpiWeekFilter.addEventListener('change', renderKpiReport);
        }

        const kpiShowReserved = document.getElementById('kpi-show-reserved');
        const kpiShowPick = document.getElementById('kpi-show-pick');
        const reservedContainer = document.getElementById('kpi-reserved-container');
        const pickContainer = document.getElementById('kpi-pick-container');
        const reservedHeader = document.getElementById('kpi-reserved-header');
        const pickHeader = document.getElementById('kpi-pick-header');

        function toggleTables() {
            if (reservedContainer && reservedHeader) {
                const display = kpiShowReserved.checked ? 'block' : 'none';
                reservedContainer.style.display = display;
                reservedHeader.style.display = display;
            }
            if (pickContainer && pickHeader) {
                const display = kpiShowPick.checked ? 'block' : 'none';
                pickContainer.style.display = display;
                pickHeader.style.display = display;
            }
        }
        if(kpiShowReserved) kpiShowReserved.addEventListener('change', toggleTables);
        if(kpiShowPick) kpiShowPick.addEventListener('change', toggleTables);

        const kpiFullscreenBtn = document.getElementById('kpi-fullscreen-btn');
        if(kpiFullscreenBtn) {
            kpiFullscreenBtn.addEventListener('click', () => {
                const card = document.querySelector('main .card');
                if(card) card.classList.toggle('kpi-fullscreen');
            });
        }

        if(kpiChartMetric) {
            kpiChartMetric.addEventListener('change', renderKpiReport);
        }

        function updateWeekOptions() {
            const startDate = document.getElementById('kpi-start-date').value;
            const endDate = document.getElementById('kpi-end-date').value;
            if(!startDate || !endDate) return;

            const start = new Date(startDate);
            const end = new Date(endDate);
            const weeks = {};

            const anchor = new Date('2024-12-30'); // Week 1 Start (Monday)

            for(let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                const dateObj = new Date(d);
                const day = dateObj.getDay();
                const diff = dateObj.getDate() - day + (day === 0 ? -6 : 1); // Monday start
                const monday = new Date(new Date(d).setDate(diff));
                const mondayStr = monday.toISOString().split('T')[0];
                
                if(!weeks[mondayStr]) {
                    let weekNum = Math.floor(Math.round((monday - anchor) / (1000 * 60 * 60 * 24)) / 7) + 1;
                    if (weekNum > 52) weekNum = ((weekNum - 1) % 52) + 1;
                    weeks[mondayStr] = { dates: [], num: weekNum };
                }
                weeks[mondayStr].dates.push(new Date(d).toISOString().split('T')[0]);
            }

            kpiWeekFilter.innerHTML = '<option value="all">All Weeks</option>';
            Object.keys(weeks).sort().forEach((mondayStr) => {
                const info = weeks[mondayStr];
                const label = `Week ${info.num} (${mondayStr}...)`;
                const opt = document.createElement('option');
                opt.value = mondayStr; 
                opt.textContent = label;
                kpiWeekFilter.appendChild(opt);
            });
        }

        function renderKpiReport() {
            const startDate = document.getElementById('kpi-start-date').value;
            const endDate = document.getElementById('kpi-end-date').value;
            const isWeekly = document.getElementById('kpi-view-weekly').checked;
            const selectedWeek = document.getElementById('kpi-week-filter').value;
            
            if(!startDate || !endDate) return;

            const start = new Date(startDate);
            const end = new Date(endDate);
            const dateArray = [];

            const timestamps = JSON.parse(localStorage.getItem('ims_counter_timestamps_v1') || '[]');
            const counters = JSON.parse(localStorage.getItem('ims_daily_counters_v1') || '[]');
            const attendance = JSON.parse(localStorage.getItem('ims_daily_counters_attendance_v1') || '[]');
            
            // Generate full date range first
            for(let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                dateArray.push(new Date(d).toISOString().split('T')[0]);
            }

            // Filter dateArray if specific week selected
            let filteredDateArray = dateArray;
            if (selectedWeek !== 'all') {
                filteredDateArray = dateArray.filter(d => {
                    const dateObj = new Date(d);
                    const day = dateObj.getDay();
                    const diff = dateObj.getDate() - day + (day === 0 ? -6 : 1); // Monday start
                    const monday = new Date(new Date(d).setDate(diff)).toISOString().split('T')[0];
                    return monday === selectedWeek;
                });
            }
            
            // Load Overrides
            const overrides = JSON.parse(localStorage.getItem('ims_kpi_overrides_v1') || '{}');

            const getData = (areaFilter) => {
                const data = {
                    '1st Shift-(6am-2pm)': { dates: {}, totalOutput: 0, totalHours: 0, targetSum: 0, targetCount: 0 },
                    '2nd Shift-(2pm-10pm)': { dates: {}, totalOutput: 0, totalHours: 0, targetSum: 0, targetCount: 0 },
                    '3rd Shift-(10pm-6am)': { dates: {}, totalOutput: 0, totalHours: 0, targetSum: 0, targetCount: 0 },
                    'Overall': { dates: {}, totalOutput: 0, totalHours: 0, targetSum: 0, targetCount: 0 }
                };

                filteredDateArray.forEach(date => {
                    Object.keys(data).forEach(k => data[k].dates[date] = { skus: 0, hc: 0, hours: 0 });
                });

                // Timestamps loop removed: Working Hours now fixed at 7.125 * HC

                const dailyHc = {};
                attendance.forEach(att => {
                    if (filteredDateArray.includes(att.date)) {
                        const key = `${att.date}|${att.shift}`;
                        if (!dailyHc[key]) dailyHc[key] = new Set();
                        dailyHc[key].add(att.userId);
                    }
                });

                filteredDateArray.forEach(date => {
                    Object.keys(data).forEach(shift => {
                        if (shift !== 'Overall') {
                            const key = `${date}|${shift}`;
                            const hc = dailyHc[key] ? dailyHc[key].size : 0;
                            data[shift].dates[date].hc = hc;
                            data['Overall'].dates[date].hc += hc;
                            
                            // Fixed Working Hours: 7.125 per HC
                            const hours = hc * 7.125;
                            data[shift].dates[date].hours = hours;
                            data['Overall'].dates[date].hours += hours;
                        }
                    });
                });

                counters.forEach(c => {
                    if(filteredDateArray.includes(c.date)) {
                        // Calculate SKUs from daily counters data (Cycle count output)
                        let skus = 0;
                        if (areaFilter === 'Pick') {
                            if (c.hourlyPickBin) skus = Object.values(c.hourlyPickBin).reduce((a,b) => a + (Number(b)||0), 0);
                        } else if (areaFilter === 'Reserved') {
                            if (c.hourlyReserved) skus = Object.values(c.hourlyReserved).reduce((a,b) => a + (Number(b)||0), 0);
                            else if (c.hourlyActuals && !c.hourlyPickBin) skus = Object.values(c.hourlyActuals).reduce((a,b) => a + (Number(b)||0), 0); // Fallback
                        }

                        if(data[c.shift]) {
                            data[c.shift].dates[c.date].skus += skus;
                            data[c.shift].totalOutput += skus;
                            data['Overall'].dates[c.date].skus += skus;
                            data['Overall'].totalOutput += skus;
                        }

                        let rate = 0;
                        if(areaFilter === 'Pick') rate = Number(c.pickRate) || 0;
                        else rate = Number(c.resRate) || 0;
                        if(rate === 0) rate = Number(c.standardRate) || 0;

                        if(rate > 0 && data[c.shift]) {
                            data[c.shift].targetSum += rate;
                            data[c.shift].targetCount++;
                            data['Overall'].targetSum += rate;
                            data['Overall'].targetCount++;
                        }
                    }
                });

                // Apply Daily Overrides & Recalculate Totals
                Object.keys(data).forEach(shift => {
                    if (shift === 'Overall') return;
                    
                    // Apply Daily Overrides
                    filteredDateArray.forEach(date => {
                        const keyPrefix = `${areaFilter}|${shift}|${date}|`;
                        if (overrides[keyPrefix + 'skus'] !== undefined) data[shift].dates[date].skus = Number(overrides[keyPrefix + 'skus']);
                        if (overrides[keyPrefix + 'hc'] !== undefined) {
                            const newHc = Number(overrides[keyPrefix + 'hc']);
                            data[shift].dates[date].hc = newHc;
                            if (overrides[keyPrefix + 'hours'] === undefined) {
                                data[shift].dates[date].hours = newHc * 7.125;
                            }
                        }
                        if (overrides[keyPrefix + 'hours'] !== undefined) data[shift].dates[date].hours = Number(overrides[keyPrefix + 'hours']);
                    });

                    // Recalculate Shift Totals
                    let totalOutput = 0;
                    let totalHours = 0;
                    filteredDateArray.forEach(date => {
                        totalOutput += data[shift].dates[date].skus;
                        totalHours += data[shift].dates[date].hours;
                    });
                    data[shift].totalOutput = totalOutput;
                    data[shift].totalHours = totalHours;

                    // Check for Row Overrides
                    const rowKeyPrefix = `${areaFilter}|${shift}|`;
                    if (overrides[rowKeyPrefix + 'target'] !== undefined) data[shift].targetAvgOverride = Number(overrides[rowKeyPrefix + 'target']);
                    if (overrides[rowKeyPrefix + 'ave_prod'] !== undefined) data[shift].aveProdOverride = Number(overrides[rowKeyPrefix + 'ave_prod']);
                });

                // Re-calculate Overall from Shifts
                filteredDateArray.forEach(date => {
                    data['Overall'].dates[date] = { skus: 0, hc: 0, hours: 0 };
                    Object.keys(data).forEach(shift => {
                        if (shift !== 'Overall') {
                            data['Overall'].dates[date].skus += data[shift].dates[date].skus;
                            data['Overall'].dates[date].hc += data[shift].dates[date].hc;
                            data['Overall'].dates[date].hours += data[shift].dates[date].hours;
                        }
                    });
                });

                // Recalculate Overall Totals
                data['Overall'].totalOutput = 0;
                data['Overall'].totalHours = 0;
                filteredDateArray.forEach(date => {
                    data['Overall'].totalOutput += data['Overall'].dates[date].skus;
                    data['Overall'].totalHours += data['Overall'].dates[date].hours;
                });

                return data;
            };

            const renderTable = (containerId, areaName, data) => {
                const container = document.getElementById(containerId);
                
                let columns = [];
                if (isWeekly) {
                    const weeks = {};
                    filteredDateArray.forEach(d => {
                        const dateObj = new Date(d);
                        const day = dateObj.getDay();
                        const diff = dateObj.getDate() - day + (day === 0 ? -6 : 1); // Monday start
                        const monday = new Date(new Date(d).setDate(diff));
                        const mondayStr = monday.toISOString().split('T')[0];
                        
                        if (!weeks[mondayStr]) weeks[mondayStr] = [];
                        weeks[mondayStr].push(d);
                    });
                    
                    Object.keys(weeks).sort().forEach(mondayStr => {
                        const weekDates = weeks[mondayStr];
                        if (weekDates.some(wd => filteredDateArray.includes(wd))) {
                            const mon = new Date(mondayStr);
                            const anchor = new Date('2024-12-30');
                            let weekNum = Math.floor(Math.round((mon - anchor) / (1000 * 60 * 60 * 24)) / 7) + 1;
                            if (weekNum > 52) weekNum = ((weekNum - 1) % 52) + 1;
                            const header = `Week ${weekNum} (${mon.toLocaleDateString('en-US', {month:'short', day:'numeric'})})`;
                            columns.push({ label: header, dates: weekDates, type: 'week' });
                        }
                    });
                } else {
                    // Daily View with Weekly Totals
                    const weeks = {};
                    filteredDateArray.forEach(d => {
                        const dateObj = new Date(d);
                        const day = dateObj.getDay();
                        const diff = dateObj.getDate() - day + (day === 0 ? -6 : 1); // Monday start
                        const monday = new Date(new Date(d).setDate(diff)).toISOString().split('T')[0];
                        if(!weeks[monday]) weeks[monday] = [];
                        weeks[monday].push(d);
                    });

                    Object.keys(weeks).sort().forEach(mondayStr => {
                        const weekDates = weeks[mondayStr];
                        weekDates.forEach(d => {
                            const dateObj = new Date(d);
                            const dayLabels = ['S', 'M', 'T', 'W', 'Th', 'F', 'S'];
                            const dayIdx = dateObj.getDay();
                            const dayName = dayLabels[dayIdx];
                            const header = `${dayName}<br>${dateObj.toLocaleString('default', { month: 'short' })} ${dateObj.getDate()}`;
                            const isSunday = dayIdx === 0;
                            columns.push({ label: header, dates: [d], type: 'day', isSunday: isSunday });
                        });
                        // Add Week Total Column
                        const mon = new Date(mondayStr);
                        const anchor = new Date('2024-12-30');
                        let weekNum = Math.floor(Math.round((mon - anchor) / (1000 * 60 * 60 * 24)) / 7) + 1;
                        if (weekNum > 52) weekNum = ((weekNum - 1) % 52) + 1;
                        columns.push({ label: `Week ${weekNum} Total`, dates: weekDates, type: 'total', isWeekTotal: true });
                    });
                }

                let html = `<table class="kpi-table"><thead><tr>
                    <th class="sticky-col col-area">Area</th>
                    <th class="sticky-col col-shift">Shift</th>
                    <th class="sticky-col col-target">Target/Hr</th>
                    <th class="sticky-col col-ave">Ave.Prod</th>
                    <th class="sticky-col col-part">Particulars</th>`;
                
                columns.forEach(col => { 
                    let cls = col.isWeekTotal ? 'week-total-col' : '';
                    if (col.isSunday) cls += ' sunday-col';
                    html += `<th class="${cls}">${col.label}</th>`; 
                });
                html += `</tr></thead><tbody>`;

                const shifts = ['1st Shift-(6am-2pm)', '2nd Shift-(2pm-10pm)', '3rd Shift-(10pm-6am)', 'Overall'];
                const shiftLabels = {'1st Shift-(6am-2pm)': '1st Shift', '2nd Shift-(2pm-10pm)': '2nd Shift', '3rd Shift-(10pm-6am)': '3rd Shift', 'Overall': 'All Shift'};
                const particulars = ['# of sku', '# of HC', 'Working Hours', 'Productivity'];

                shifts.forEach((shift, shiftIndex) => {
                    const rowData = data[shift];
                    
                    let targetAvg = 0;
                    if (areaName === 'Reserved Bin') {
                        targetAvg = (shift === 'Overall') ? 12 : 4;
                    } else if (areaName === 'Pick Bin') {
                        targetAvg = (shift === 'Overall') ? 66 : 22;
                    }

                    let aveProd = rowData.totalHours > 0 ? Math.round(rowData.totalOutput / rowData.totalHours) : 0;
                    
                    // Use overrides if available
                    if (rowData.targetAvgOverride !== undefined) targetAvg = rowData.targetAvgOverride;
                    if (rowData.aveProdOverride !== undefined) aveProd = rowData.aveProdOverride;

                    const isOverall = shift === 'Overall';
                    
                    let aveProdClass = '';
                    if (targetAvg > 0) {
                        if (aveProd >= targetAvg) aveProdClass = ' kpi-success';
                        else aveProdClass = ' kpi-failure';
                    }

                    // Editable attributes for summary columns
                    const editTargetAttr = (!isOverall && !isWeekly) ? `contenteditable="true" class="sticky-col col-target editable-cell" onblur="saveKpiEdit(this, '${areaName}', '${shift}', null, 'target')"` : `class="sticky-col col-target"`;
                    const editAveAttr = (!isOverall && !isWeekly) ? `contenteditable="true" class="sticky-col col-ave editable-cell${aveProdClass}" onblur="saveKpiEdit(this, '${areaName}', '${shift}', null, 'ave_prod')"` : `class="sticky-col col-ave${aveProdClass}"`;
                    
                    particulars.forEach((part, partIndex) => {
                        let trClass = '';
                        if (part === 'Working Hours' || part === 'Productivity') {
                            trClass = 'highlight-row';
                        }
                        html += `<tr class="${trClass}">`;
                        if (shiftIndex === 0 && partIndex === 0) {
                            html += `<td rowspan="${shifts.length * particulars.length}" class="sticky-col col-area" style="vertical-align: middle; font-weight: bold;">${areaName}</td>`;
                        }
                        if (partIndex === 0) {
                            html += `<td rowspan="4" class="sticky-col col-shift" style="font-weight:bold;">${shiftLabels[shift]}</td><td rowspan="4" ${editTargetAttr}>${targetAvg}</td><td rowspan="4" ${editAveAttr}>${aveProd}</td>`;
                        }
                        html += `<td class="sticky-col col-part">${part}</td>`;
                        
                        columns.forEach(col => {
                            let cellValue = '';
                            let sumSkus = 0, sumHours = 0, sumHc = 0, countHc = 0;
                            let isEditable = false;
                            let metricKey = '';

                            col.dates.forEach(d => {
                                if (rowData.dates[d]) {
                                    sumSkus += rowData.dates[d].skus;
                                    sumHours += rowData.dates[d].hours;
                                    if (rowData.dates[d].hc > 0) { sumHc += rowData.dates[d].hc; countHc++; }
                                }
                            });

                            let cls = col.isWeekTotal ? 'week-total-col' : '';
                            if (col.isSunday) cls += ' sunday-col';

                            if (part === '# of sku') cellValue = sumSkus;
                            else if (part === '# of HC') cellValue = countHc > 0 ? Math.round(sumHc / countHc) : 0;
                            else if (part === 'Working Hours') {
                                let dailyHours = 7.125;
                                if (shift === 'Overall') dailyHours = 21.375;
                                cellValue = Number((dailyHours * col.dates.length).toFixed(3));
                            }
                            else if (part === 'Productivity') {
                                const pVal = sumHours > 0 ? (sumSkus / sumHours) : 0;
                                cellValue = pVal.toFixed(2);
                                if (targetAvg > 0) {
                                    if (pVal >= targetAvg) cls += ' kpi-success';
                                    else cls += ' kpi-failure';
                                }
                            }
                            
                            let editAttr = '';
                            if (!isOverall && col.type === 'day') {
                                if (part === '# of sku') {
                                    editAttr = `contenteditable="true" onblur="saveKpiEdit(this, '${areaName}', '${shift}', '${col.dates[0]}', 'skus')"`;
                                    cls += ' editable-cell';
                                } else if (part === '# of HC') {
                                    editAttr = `contenteditable="true" onblur="saveKpiEdit(this, '${areaName}', '${shift}', '${col.dates[0]}', 'hc')"`;
                                    cls += ' editable-cell';
                                } else if (part === 'Working Hours') {
                                    editAttr = `contenteditable="true" onblur="saveKpiEdit(this, '${areaName}', '${shift}', '${col.dates[0]}', 'hours')"`;
                                    cls += ' editable-cell';
                                }
                            }
                            html += `<td class="${cls}" ${editAttr}>${cellValue}</td>`;
                        });
                        html += `</tr>`;
                    });
                });
                html += `</tbody></table>`;

                // Second Table: Target Output (Should # of SKU)
                html += `<h5 style="margin: 20px 0 5px 0; color: #2752a7;">Target Output (Should # of SKU)</h5>`;
                html += `<table class="kpi-table"><thead><tr>
                    <th class="sticky-col col-area">Area</th>
                    <th class="sticky-col col-shift">Shift</th>
                    <th class="sticky-col col-target">Target/Hr</th>
                    <th class="sticky-col col-ave">Ave.Prod</th>
                    <th class="sticky-col col-part">Particulars</th>`;
                
                columns.forEach(col => { 
                    let cls = col.isWeekTotal ? 'week-total-col' : '';
                    if (col.isSunday) cls += ' sunday-col';
                    html += `<th class="${cls}">${col.label}</th>`; 
                });
                html += `</tr></thead><tbody>`;

                shifts.forEach((shift, shiftIndex) => {
                    const rowData = data[shift];
                    let targetAvg = 0;
                    if (areaName === 'Reserved Bin') targetAvg = (shift === 'Overall') ? 12 : 4;
                    else if (areaName === 'Pick Bin') targetAvg = (shift === 'Overall') ? 66 : 22;
                    if (rowData.targetAvgOverride !== undefined) targetAvg = rowData.targetAvgOverride;

                    html += `<tr>`;
                    if (shiftIndex === 0) html += `<td rowspan="${shifts.length}" class="sticky-col col-area" style="vertical-align: middle; font-weight: bold;">${areaName}</td>`;
                    html += `<td class="sticky-col col-shift" style="font-weight:bold;">${shiftLabels[shift]}</td>`;
                    html += `<td class="sticky-col col-target">${targetAvg}</td>`;
                    html += `<td class="sticky-col col-ave">-</td>`;
                    html += `<td class="sticky-col col-part">Should # of SKU</td>`;

                    columns.forEach(col => {
                        let val = 0;
                        if (shift === 'Overall') {
                            // Sum of individual shifts
                            ['1st Shift-(6am-2pm)', '2nd Shift-(2pm-10pm)', '3rd Shift-(10pm-6am)'].forEach(s => {
                                const sData = data[s];
                                let sTarget = (areaName === 'Reserved Bin') ? 4 : 22;
                                if (sData.targetAvgOverride !== undefined) sTarget = sData.targetAvgOverride;
                                col.dates.forEach(d => { if(sData.dates[d]) val += sData.dates[d].hours * sTarget; });
                            });
                        } else {
                            col.dates.forEach(d => { if(rowData.dates[d]) val += rowData.dates[d].hours * targetAvg; });
                        }
                        
                        let cls = col.isWeekTotal ? 'week-total-col' : '';
                        if (col.isSunday) cls += ' sunday-col';
                        html += `<td class="${cls}">${Math.round(val)}</td>`;
                    });
                    html += `</tr>`;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
            };

            const reservedData = getData('Reserved');
            renderTable('kpi-reserved-container', 'Reserved Bin', reservedData);

            const pickData = getData('Pick');
            renderTable('kpi-pick-container', 'Pick Bin', pickData);
            
            renderKpiChart(filteredDateArray, reservedData, pickData, isWeekly);
            
            applyColumnVisibility();
        }

        function applyColumnVisibility() {
            const hideTarget = !document.getElementById('kpi-col-target').checked;
            const hideAve = !document.getElementById('kpi-col-ave').checked;
            const hidePart = !document.getElementById('kpi-col-part').checked;

            document.querySelectorAll('.col-target').forEach(el => el.style.display = hideTarget ? 'none' : '');
            document.querySelectorAll('.col-ave').forEach(el => el.style.display = hideAve ? 'none' : '');
            document.querySelectorAll('.col-part').forEach(el => el.style.display = hidePart ? 'none' : '');
            
            updateStickyPositions();
        }

        function updateStickyPositions() {
            const hideTarget = !document.getElementById('kpi-col-target').checked;
            const hideAve = !document.getElementById('kpi-col-ave').checked;
            
            let currentLeft = 0;
            document.querySelectorAll('.col-area').forEach(el => el.style.left = currentLeft + 'px');
            currentLeft += 80;
            document.querySelectorAll('.col-shift').forEach(el => el.style.left = currentLeft + 'px');
            currentLeft += 80;
            if(!hideTarget) { document.querySelectorAll('.col-target').forEach(el => el.style.left = currentLeft + 'px'); currentLeft += 70; }
            if(!hideAve) { document.querySelectorAll('.col-ave').forEach(el => el.style.left = currentLeft + 'px'); currentLeft += 70; }
            document.querySelectorAll('.col-part').forEach(el => el.style.left = currentLeft + 'px');
        }

        function renderKpiChart(dates, resData, pickData, isWeekly) {
            const ctx = document.getElementById('kpi-trend-chart');
            const metricSelect = document.getElementById('kpi-chart-metric');
            const titleEl = document.getElementById('kpi-chart-title');
            if (!ctx) return;

            const metric = metricSelect ? metricSelect.value : 'productivity';
            if(titleEl) titleEl.textContent = metric === 'productivity' ? 'Productivity Trend (Overall)' : 'Total Output Trend (Overall)';

            let labels = [];
            let resPoints = [];
            let pickPoints = [];

            if (isWeekly) {
                const weeks = {};
                const anchor = new Date('2024-12-30');
                
                dates.forEach(d => {
                    const dateObj = new Date(d);
                    const day = dateObj.getDay();
                    const diff = dateObj.getDate() - day + (day === 0 ? -6 : 1); 
                    const monday = new Date(new Date(d).setDate(diff));
                    const mondayStr = monday.toISOString().split('T')[0];
                    if (!weeks[mondayStr]) weeks[mondayStr] = [];
                    weeks[mondayStr].push(d);
                });

                Object.keys(weeks).sort().forEach(mondayStr => {
                    const weekDates = weeks[mondayStr];
                    if (weekDates.some(wd => dates.includes(wd))) {
                        const mon = new Date(mondayStr);
                        let weekNum = Math.floor(Math.round((mon - anchor) / (1000 * 60 * 60 * 24)) / 7) + 1;
                        if (weekNum > 52) weekNum = ((weekNum - 1) % 52) + 1;
                        labels.push(`Week ${weekNum}`);

                        let rSkus = 0, rHours = 0, pSkus = 0, pHours = 0;
                        weekDates.forEach(d => {
                            if (dates.includes(d)) {
                                const rDay = resData['Overall'].dates[d];
                                if (rDay) { rSkus += rDay.skus; rHours += rDay.hours; }
                                const pDay = pickData['Overall'].dates[d];
                                if (pDay) { pSkus += pDay.skus; pHours += pDay.hours; }
                            }
                        });
                        
                        if (metric === 'productivity') {
                            resPoints.push(rHours > 0 ? (rSkus / rHours).toFixed(2) : 0);
                            pickPoints.push(pHours > 0 ? (pSkus / pHours).toFixed(2) : 0);
                        } else {
                            resPoints.push(rSkus);
                            pickPoints.push(pSkus);
                        }
                    }
                });
            } else {
                labels = dates;
                if (metric === 'productivity') {
                    resPoints = dates.map(d => {
                        const day = resData['Overall'].dates[d];
                        return (day && day.hours > 0) ? (day.skus / day.hours).toFixed(2) : 0;
                    });
                    pickPoints = dates.map(d => {
                        const day = pickData['Overall'].dates[d];
                        return (day && day.hours > 0) ? (day.skus / day.hours).toFixed(2) : 0;
                    });
                } else {
                    resPoints = dates.map(d => { const day = resData['Overall'].dates[d]; return day ? day.skus : 0; });
                    pickPoints = dates.map(d => { const day = pickData['Overall'].dates[d]; return day ? day.skus : 0; });
                }
            }

            if (kpiChartInstance) kpiChartInstance.destroy();
            kpiChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Reserved Bin', data: resPoints, borderColor: '#ef6c00', backgroundColor: 'rgba(239, 108, 0, 0.1)', tension: 0.3, fill: true },
                        { label: 'Pick Bin', data: pickPoints, borderColor: '#1565c0', backgroundColor: 'rgba(21, 101, 192, 0.1)', tension: 0.3, fill: true }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: { y: { beginAtZero: true, title: { display: true, text: metric === 'productivity' ? 'Productivity (SKU/Hr)' : 'Total Output (SKUs)' } } }
                }
            });
        }

        window.saveKpiEdit = function(el, area, shift, date, metric) {
            let storageArea = area;
            if (area === 'Reserved Bin') storageArea = 'Reserved';
            else if (area === 'Pick Bin') storageArea = 'Pick';

            const val = el.innerText.trim();
            const overrides = JSON.parse(localStorage.getItem('ims_kpi_overrides_v1') || '{}');
            let key = '';
            
            if (date) {
                key = `${storageArea}|${shift}|${date}|${metric}`;
            } else {
                key = `${storageArea}|${shift}|${metric}`;
            }
            
            overrides[key] = val;
            localStorage.setItem('ims_kpi_overrides_v1', JSON.stringify(overrides));
            
            if(window.addNotification) window.addNotification('Saved', 'success');
            
            // Re-render to update totals/averages
            renderKpiReport();
        };

        document.querySelectorAll('.kpi-col-toggle').forEach(cb => {
            cb.addEventListener('change', applyColumnVisibility);
        });

        // Initial Load
        const savedStart = localStorage.getItem('ims_kpi_start_date');
        const savedEnd = localStorage.getItem('ims_kpi_end_date');

        if (savedStart && savedEnd) {
            document.getElementById('kpi-start-date').value = savedStart;
            document.getElementById('kpi-end-date').value = savedEnd;
        } else {
            const now = new Date();
            const year = now.getFullYear();
            const firstJan = new Date(year, 0, 1);
            const day = firstJan.getDay();
            const diff = firstJan.getDate() - day + (day === 0 ? -6 : 1); // Monday start
            const firstMonday = new Date(firstJan.setDate(diff));
            document.getElementById('kpi-start-date').value = firstMonday.toISOString().split('T')[0];
            document.getElementById('kpi-end-date').value = now.toISOString().split('T')[0];
        }
        updateWeekOptions();
        renderKpiReport();
    });
  </script>
